<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Latihan DOM</title>

    <!-- Bootstrap -->
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/css/bootstrap.min.css">

    <!-- Font Awesome -->
    <script defer src="https://use.fontawesome.com/releases/v5.8.1/js/all.js"></script>

    <style>
        body {
            background-color: #271974;
        }

        .navbar {
            background: linear-gradient(to right, #13d9e0, #13d9e0);
        }

        .card {
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.05);
        }

        .btn-pink {
            background-color: #13d9e0;
            color: white;
        }

        .btn-pink:hover {
            background-color: #13d9e0;
        }
    </style>
</head>
<body>

<div class="container mt-4">

    <!-- NAVBAR -->
    <nav class="navbar navbar-light rounded">
        <span class="navbar-brand text-white font-weight-bold">
            Mini Ecommerce
        </span>

        <div class="form-inline">
            <input class="form-control mr-2" type="search" placeholder="Cari barang..." id="search-input">
            <button class="btn btn-light mr-3" id="search-btn">Search</button>

            <button class="btn btn-light">
                <i class="fas fa-shopping-cart"></i>
                (<span id="cart-count">0</span>)
            </button>
        </div>
    </nav>

    <!-- PRODUK -->
    <div class="row mt-4" id="product-list"></div>

</div>

<script>

// DATA PRODUK
const products = [
    {
        name: "Keyboard Logitek",
        desc: "Keyboard yang mantap untuk kantoran",
        price: 60000,
        image: "keyboard1.jpg"
    },
    {
        name: "Keyboard MSI",
        desc: "Keyboard gaming MSI mekanik",
        price: 300000,
        image: "keyboard2.jpg"
    },
    {
        name: "Mouse Genius",
        desc: "Mouse Genius biar lebih pinter",
        price: 50000,
        image: "mouse1.jpg"
    },
    {
        name: "Mouse Jery",
        desc: "Mouse yang disuka kucing",
        price: 30000,
        image: "mouse2.jpg"
    }
];

const productList = document.getElementById("product-list");
const cartCount = document.getElementById("cart-count");
const searchInput = document.getElementById("search-input");
const searchButton = document.getElementById("search-btn");

let totalItem = 0;

// FUNCTION TAMPILKAN PRODUK
function tampilkanProduk(data) {
    productList.innerHTML = "";

    data.forEach((product) => {
        const col = document.createElement("div");
        col.className = "col-md-4 mb-4";

        col.innerHTML = `
            <div class="card p-3 text-center">
                <img src="${product.image}" class="card-img-top mb-3" height="200">
                <h5 class="text-danger font-weight-bold">${product.name}</h5>
                <p>${product.desc}</p>
                <h6 class="font-weight-bold">Rp ${product.price.toLocaleString()}</h6>
                <button class="btn btn-pink mt-2 add-to-cart">
                    Tambahkan ke keranjang
                </button>
            </div>
        `;

        productList.appendChild(col);
    });
}

// Tampilkan semua pertama kali
tampilkanProduk(products);

// EVENT SEARCH
searchButton.addEventListener("click", function() {

    const keyword = searchInput.value.trim().toLowerCase();

    // Ubah tombol jadi hijau
    searchButton.classList.remove("btn-light");
    searchButton.classList.add("btn-success");

    if (keyword === "") {
        // kalau kosong tampilkan semua
        tampilkanProduk(products);
    } else {
        const hasilFilter = products.filter(product =>
            product.name.toLowerCase().includes(keyword)
        );
        tampilkanProduk(hasilFilter);
    }

});

// Bisa tekan Enter
searchInput.addEventListener("keyup", function(e){
    if(e.key === "Enter"){
        searchButton.click();
    }
});

// EVENT TAMBAH KE KERANJANG
document.addEventListener("click", function(e) {
    if(e.target.classList.contains("add-to-cart")){
        totalItem++;
        cartCount.innerText = totalItem;
    }
});

</script>

</body>
</html>
